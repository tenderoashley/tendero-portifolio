<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header">
        <div class="header-inner container">
            <div class="site-title">Tendero</div>
            <button id="navToggle" class="nav-toggle" aria-label="Toggle navigation">☰</button>
            <nav id="mainNav" class="nav-links">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="projects.html">Projects</a>
                <a href="contacts.html" class="active">Contact</a>
            </nav>
        </div>
    </header>
    <section class="container">
        <h2>Contact Me</h2>

        <form>
            <input type="text" placeholder="Name" required>
            <input type="email" placeholder="Email" required>
            <textarea placeholder="Message" required></textarea>
            <button type="submit">Send</button>
        </form>

        <p>Email: <a href="mailto:tenderokachisi706@email.com">tenderokachisi706@email.com</a></p>
    </section>

    <script>
        const navToggle = document.getElementById('navToggle');
        const mainNav = document.getElementById('mainNav');
        navToggle?.addEventListener('click', () => mainNav.classList.toggle('open'));
        mainNav?.querySelectorAll('a').forEach(link => link.addEventListener('click', () => mainNav.classList.remove('open')));
    </script>
</body>
</html>
